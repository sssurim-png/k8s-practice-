# deployment =replica+@
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway-deploy
  namespace: rim
spec:
# 보통 2개이상으로 해라. 특히 실시간은 무조건 2개이상으로 가야한다
  replicas: 1
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
      - name: apigateway
      # docker hub ->ecr image변경
      # ecr가서 레파지 들어가서 url확인하고넣어줘야된다(xxx 이부분):latest
        image: 346903264902.dkr.ecr.ap-northeast-2.amazonaws.com/rim/apigateway:latest
        ports:
        - containerPort: 8080

        # db secret값 실행 시 불러오기
        resources:
        # 컨테이너가 사용할수 있는 리소스의 최대치
          limits:
            cpu: "1"
            memory: "500Mi"
        # 컨테이너가 시작될때 보장받아야 하는 최소 자원
          requests:
            cpu: "0.5"
            memory: "250Mi"
            
        # env: 비밀번호 설정할게 없다 여기서는
        # # 
        # # 아래의 name과 yml의 ${}의 변수명과 일치해야함
        # - name: DB_HOST
        #   valueFrom:
        #     secretKeyRef:
        #       name: ordersystem-secrets
        #       key: DB_HOST
        # - name: DB_PW
        #   valueFrom:
        #     secretKeyRef:
        #       name: ordersystem-secrets
        #       key: DB_PW
        # 컨테이너 상태 확인을 통해 롤링업데이트 최적화 



        readinessProbe:
          httpGet:
            # healthcheck 경로
            path: /health
            port: 8080
          # 컨테이너 시작 후 지연
          initialDelaySeconds: 10
          # 확인 반복 주기
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway-service
  namespace: rim
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: apigateway