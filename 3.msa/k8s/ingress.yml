# ingress-controller 설치 명령어
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/aws/deploy.yaml
# aws lb -> ingress controller pod -> ingress -> service로의 라우팅

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ordersystem-ingress
  namespace: rim
  annotations:
    kubernetes.io/ingress.class: nginx
    
spec:
  tls:
  - hosts:
    - "server.rim2379.store"
    secretName: server-rim2379-store-tls
  rules:
  - host: server.rim2379.store  # 설정하려는 도메인 이름.
    http: 
      paths:
      - path: /
      # - path: /bradkim1/ #bradkim1으로 시작하는 모든 url요청을 my-service로 라우팅한다는 정규표현식 
        pathType: Prefix
        backend:
          service:
          # deploy에 있는거랑 맞췄다
          # apigate로 보낼거다
            name: apigateway-service
            port:
              number: 80

              # gateway없이 하면 서비스마다 인증처리를 해줘야한다 밖에서 접근이 가능해져버린다
# →1처럼 apigateway로 모았다 들어가서 인증처리는 apigateway만 인증처리
