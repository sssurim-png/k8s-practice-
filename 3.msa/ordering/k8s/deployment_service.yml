# deployment =replica+@
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-deployment
  namespace: rim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering
  template:
    metadata:
      labels:
        app: ordering
    spec:
      containers:
      # 컨테이너명은 괜찮다 그냥 같게 한것
      - name: ordering
      # docker hub ->ecr image변경
        image: 346903264902.dkr.ecr.ap-northeast-2.amazonaws.com/rim/ordering 
        ports:
        - containerPort: 8080

        # db secret값 실행 시 불러오기
        resources:
        # 컨테이너가 사용할수 있는 리소스의 최대치
          limits:
            cpu: "1"
            memory: "500Mi"
        # 컨테이너가 시작될때 보장받아야 하는 최소 자원
          requests:
            cpu: "0.5"
            memory: "250Mi"
            
            # 여기는 env필요함 앞전꺼ㅓ랑 다르게
        env:
        # 아래의 name과 yml의 ${}의 변수명과 일치해야함
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: ordersystem-secrets
              key: DB_HOST
        - name: DB_PW
          valueFrom:
            secretKeyRef:
              name: ordersystem-secrets
              key: DB_PW
        # 컨테이너 상태 확인을 통해 롤링업데이트 최적화 
        readinessProbe:
          httpGet:
            # healthcheck 경로
            path: /health
            port: 8080
          # 컨테이너 시작 후 지연
          initialDelaySeconds: 10
          # 확인 반복 주기
          periodSeconds: 10




          # 서비스
          # 게이트웨이랑 맞춰줄것
          # 위 라벨도 맞춰줄 것
---
apiVersion: v1
kind: Service
metadata:
  name: ordering-service
  namespace: rim
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: ordering