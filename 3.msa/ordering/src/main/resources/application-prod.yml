server:
  #  port 번호가 0번일 경우, 0~65535중에 현재 host에서 사용하지 않는 port 임의로 설정
#  쿠버
  port: 8080

eureka:
#  유레카 안쓴다
  client:
    enabled: false
#    분기처리(위에서 euraka, enabled로 유레카 안쓰고 service로 연결하겠다)
product:
  service:
    url: "http://product-service"

spring:
#  추가
  config:
    activate:
      on-profile: prod
  application:
    name: ordering-service
  datasource:
#    db가리기
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL=true
    username: admin
    password: ${DB_PW}
 #   운영 DB의 낮은 스펙과 msa의 많은 커넥션을 감안한 커넥션 축소 설정
    hikari:
      maximum-pool-size: 1
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true

  redis:
#    바꿈
    host: redis-service
    port: 6379
  kafka:
#    바꿈
    kafka-server: kafka-service:9092

logging:
  level:
    root: info


