server:
  #  port 번호가 0번일 경우, 0~65535중에 현재 host에서 사용하지 않는 port 임의로 설정
  port: 8080

eureka:
  #  유레카 안쓴다
  client:
    enabled: false

spring:
#  추가
  config:
    activate:
      on-profile: prod
  application:
    name: product-service
  datasource:
#    db고치기
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL= true
    username: admin
    password: ${DB_PW}
   #   운영 DB의 낮은 스펙과 msa의 많은 커넥션을 감안한 커넥션 축소 설정
    hikari:
      maximum-pool-size: 1
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true

  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  redis:
    host: redis-service
    port: 6379
    #  스프링 안에 봍통 넣는다
  kafka:
    kafka-server: kafka-service:9092
    consumer:
      group-id: product-group
#    카프카에서 그룹아이디는 컨슈머 그룹을 식별하는 ID로서, 동일한 그룹Id를 가진 컨슈머들은 메시지를 분담해서 consume









mybatis:
  mapper-locations: classpath:/mapper/**/*.xml




logging:
  level:
    root: info

aws:
  credentials:
    access-key: xxxx
    secret-key: yyyy
  region: ap-northeast-2
  s3:
    bucket1: member-product-image

