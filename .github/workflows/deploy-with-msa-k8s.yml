# apply하나(원래 실무에서는 각각 레파지토리ㅏ 있다 이렇게 4개 한번에 넣지 않는다)
      - name: ordering kubectl apply
      # 경로지정 -apply먼저, rollout다음(처음에만)
        run: |
          kubectl apply -f ./3.msa/ordering/k8s/deployment_service.yml
          kubectl rollout restart deployment ordering-deployment -n rim




# apply하나(원래 실무에서는 각각 레파지토리ㅏ 있다 이렇게 4개 한번에 넣지 않는다)
      # 경로지정 -apply먼저, rollout다음(처음에만)
