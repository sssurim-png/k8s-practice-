# 오토스케일 +hpa

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-backend-hpa
  namespace: rim
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ordersystem-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 임계치
          averageUtilization: 50