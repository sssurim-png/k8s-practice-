# service 붙이기 (파트끼리의 내부통신용)

apiVersion: v1
kind: Service
metadata:
# 클러스터내에서 service명은 url주소(엔드포인트)로 사용. ex)http://my-service:포트번호
  name: my-service
  namespace: rim
spec:
# 안적으면 디폴트 
  type: ClusterIP
  ports:
  # 내부 포트 중요
  # service의 port
  # port는 서비스의 port. targetPort는 pod내 컨테이너의 port(내부포트).
  - port: 80
# 내가 가야할 포트 if 해당하는 라벨(파트)로 들어갔을때 컨테이너가 여러개면 찾아갈 포트번호
    targetPort: 80
    # 어디로 가야되지 라벨명(파드)로간다
    # selector.app은 pod의 label과 일치되어야 매핑이 됨.
  selector:
    app: my-nginx